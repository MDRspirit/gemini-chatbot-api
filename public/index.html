<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .chat-container {
      background: #ffffff;
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: #007bff;
      color: white;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header h2 { font-size: 1.2rem; font-weight: 600; margin: 0; }
    .chat-header p { font-size: 0.85rem; opacity: 0.9; margin: 0; }
    .avatar { font-size: 2.2rem; }

    #chat-box {
      height: 450px;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fb;
    }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }

    .message {
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 0.95rem;
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bot {
      background: #ffffff;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #edf2f7;
    }
    .bot.thinking {
      color: #6c757d;
      font-style: italic;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    #chat-form {
      display: flex;
      padding: 1rem;
      background: #fff;
      border-top: 1px solid #edf2f7;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #007bff; }

    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    button:hover { background: #0056b3; transform: scale(1.05); }
    button svg { fill: white; width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar">✨</div>
      <div>
        <h2>Gemini Chatbot</h2>
        <p>Selalu siap membantu</p>
      </div>
    </header>

    <div id="chat-box"></div>

    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Ketik pesanmu di sini..." autocomplete="off" required />
      <button type="submit" title="Kirim Pesan">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </form>
  </div>

  <script src="/script.js"></script>
</body>
</html>
